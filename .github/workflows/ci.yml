name: EcoBarter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ──────────────────────────────────────────────────────────
  # Frontend — build check
  # ──────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install --filter web
      - name: Build Web Frontend
        working-directory: ./apps/web
        run: pnpm run build

  # ──────────────────────────────────────────────────────────
  # Trade Engine (Go) — format, vet, and unit tests
  # ──────────────────────────────────────────────────────────
  test-trade-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: services/trade/go.sum
      - name: Tidy & Download Modules
        working-directory: ./services/trade
        run: go mod tidy && go mod download
      - name: Go Format Check
        working-directory: ./services/trade
        run: test -z "$(gofmt -l .)"
      - name: Go Vet
        working-directory: ./services/trade
        run: go vet ./...
      - name: Run Unit Tests
        working-directory: ./services/trade
        run: go test -tags test -v -race -count=1 ./...

  # ──────────────────────────────────────────────────────────
  # Identity Service (Python / FastAPI)
  # ──────────────────────────────────────────────────────────
  test-identity-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        working-directory: ./services/identity
        run: pip install -r requirements-test.txt
      - name: Run pytest
        working-directory: ./services/identity
        run: pytest -v

  # ──────────────────────────────────────────────────────────
  # Reputation Service (Python / FastAPI)
  # ──────────────────────────────────────────────────────────
  test-reputation-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        working-directory: ./services/reputation
        run: pip install -r requirements-test.txt
      - name: Run pytest
        working-directory: ./services/reputation
        run: pytest -v

  # ──────────────────────────────────────────────────────────
  # Docker Compose — structural validation
  # ──────────────────────────────────────────────────────────
  docker-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config
