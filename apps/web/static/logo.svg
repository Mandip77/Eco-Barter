<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" fill="none" role="img" aria-label="EcoBarter logo">
  <title>EcoBarter</title>
  <g transform="translate(150,210) rotate(-18) translate(-150,-210)"
     stroke="#1a5c2a" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Leaf outline -->
    <path d="M 150 28
             C 218 35, 250 112, 247 168
             C 244 222, 200 268, 150 278
             C 100 268, 56 222, 53 168
             C 50 112, 82 35, 150 28 Z"
          stroke-width="10"/>

    <!-- Stem -->
    <line x1="150" y1="278" x2="128" y2="352" stroke-width="12" stroke-linecap="round"/>

    <!-- Midrib — diagonal vein through circle center -->
    <line x1="150" y1="28" x2="128" y2="352" stroke-width="5.5"/>

    <!-- Exchange arrows: center (141,168), radius 48 -->

    <!-- Top arc: left(93,168) → right(189,168), clockwise over top -->
    <path d="M 93 168 A 48 48 0 0 1 189 168"
          stroke-width="9" stroke-linecap="butt"/>
    <!-- Arrowhead at right endpoint — tangent points downward -->
    <polygon points="189,184 180,163 198,163" fill="#1a5c2a" stroke="none"/>

    <!-- Bottom arc: right(189,168) → left(93,168), clockwise under bottom -->
    <path d="M 189 168 A 48 48 0 0 1 93 168"
          stroke-width="9" stroke-linecap="butt"/>
    <!-- Arrowhead at left endpoint — tangent points upward -->
    <polygon points="93,152 84,173 102,173" fill="#1a5c2a" stroke="none"/>

  </g>
</svg>
