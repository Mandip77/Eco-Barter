# EcoBarter — Production overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Requires: DOMAIN, ACME_EMAIL, ALLOWED_ORIGINS set in .env

services:

  # ── Traefik ─────────────────────────────────────────────────────────────────
  # Uses file provider (traefik/traefik.yml + traefik/dynamic.yml) instead of
  # Docker provider — avoids the Docker API version mismatch on Oracle Cloud
  # where the daemon requires API >= 1.40 but Traefik's SDK negotiates from 1.24.
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "./traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
    deploy:
      resources:
        limits: { memory: 128m, cpus: "0.15" }

  # ── Databases ───────────────────────────────────────────────────────────────
  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 2g, cpus: "0.80" }

  mongodb:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 2g, cpus: "0.60" }

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.10" }

  nats:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.10" }

  # ── Identity ─────────────────────────────────────────────────────────────────
  identity-service:
    restart: unless-stopped
    environment:
      - ALLOWED_ORIGINS=https://${DOMAIN}
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.20" }

  # ── Catalog ──────────────────────────────────────────────────────────────────
  catalog-service:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.20" }

  # ── Trade Engine ─────────────────────────────────────────────────────────────
  trade-engine:
    restart: on-failure
    command: ["./trade-engine"]
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.30" }

  # ── Reputation ───────────────────────────────────────────────────────────────
  reputation-service:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.10" }

  # ── Centrifugo ───────────────────────────────────────────────────────────────
  centrifugo:
    restart: unless-stopped
    environment:
      - CENTRIFUGO_ALLOWED_ORIGINS=https://${DOMAIN}
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.20" }

  # ── Frontend ─────────────────────────────────────────────────────────────────
  web-frontend:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.20" }
